<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <title>飼料管理中心</title>
    <style>
        :root { --primary: #d2691e; --secondary: #2e7d32; --bg: #f4f7f6; --text: #333; --blue: #007aff; --border: #e0e0e0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 60px; line-height: 1.4; }
        .container { max-width: 500px; margin: auto; }
        h1 { font-size: 1.4rem; color: var(--primary); margin: 15px 0 25px; text-align: center; font-weight: 800; letter-spacing: 1px; }
        
        /* 卡片優化 */
        .card { background: white; border-radius: 20px; padding: 22px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); }
        h2 { font-size: 1rem; margin: 0 0 16px 0; color: #444; font-weight: 700; display: flex; align-items: center; }
        h2::before { content: ""; width: 4px; height: 16px; background: var(--primary); border-radius: 2px; margin-right: 8px; }

        label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 6px; color: #888; text-transform: uppercase; }
        
        /* 輸入框優化 */
        input, select, textarea { 
            width: 100%; padding: 12px 14px; border: 1.5px solid #f0f0f0; border-radius: 12px; 
            font-size: 16px; background: #fafafa; transition: all 0.2s ease; color: #222;
        }
        input:focus, select:focus { border-color: var(--blue); background: #fff; outline: none; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        input::placeholder { color: #ccc; }

        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .form-group { margin-bottom: 12px; }

        /* 按鈕優化 */
        .btn { width: 100%; padding: 14px; border-radius: 14px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-primary { background: var(--blue); color: white; margin-top: 8px; }
        .btn-secondary { background: var(--secondary); color: white; }
        
        /* 列表項優化 */
        .food-item { border-bottom: 1px solid #f5f5f5; padding: 16px 4px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .food-item:last-child { border-bottom: none; }
        .food-info { flex: 1; min-width: 0; cursor: pointer; }
        .food-title-row { display: flex; align-items: center; margin-bottom: 4px; }
        .food-info b { font-size: 1rem; color: #1a1a1a; }
        
        .status-badge { padding: 3px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; margin-left: 8px; flex-shrink: 0; letter-spacing: 0.5px; }
        .bg-eating { background-color: #e8f5e9; color: #2e7d32; }
        .bg-stock { background-color: #e3f2fd; color: #1976d2; }
        .bg-done { background-color: #f5f5f5; color: #999; }
        .avoid-buy { background-color: #fff8f8 !important; border-radius: 12px; padding-left: 10px !important; } 

        .sub-text { font-size: 0.85rem; color: #777; display: block; margin-bottom: 4px; }
        .memo-text { font-size: 0.75rem; color: #2e7d32; font-weight: 600; margin-top: 8px; background: #f0f7f0; padding: 6px 10px; border-radius: 8px; display: inline-block; }
        
        .food-meta { text-align: right; flex-shrink: 0; padding-top: 2px; }
        .price-tag { font-weight: 800; color: var(--primary); font-size: 1.1rem; }
        .unit-price { font-size: 10px; color: #bbb; font-weight: 500; }
        
        /* 彈窗 */
        #memoModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:100; justify-content:center; align-items:center; backdrop-filter: blur(4px); }
        .modal-content { background:white; padding:25px; border-radius:24px; width:90%; max-width:380px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    </style>
</head>
<body>

<div id="memoModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top:0; font-size:1.2rem;">📝 編輯心得</h3>
        <p id="modalSubTitle" style="font-size:0.9rem; color:#888; margin-bottom:15px;"></p>
        <textarea id="memoInput" rows="4" placeholder="輸入餵食反應、毛孩喜好..."></textarea>
        <button class="btn btn-primary" style="margin-top:20px;" onclick="saveMemo()">儲存心得</button>
        <button class="btn" style="background:#eee; color:#666; margin-top:10px;" onclick="closeModal()">取消</button>
        <button class="btn" style="background:none; color:#ff5252; font-size:13px; margin-top:15px; font-weight:600;" id="deleteBtn">🗑 刪除此筆紀錄</button>
    </div>
</div>

<div class="container">
    <h1>🐾 飼料管理中心</h1>

    <div class="card">
        <h2>新購入庫</h2>
        <div class="form-row">
            <div style="flex:3"><label>品牌</label><input type="text" id="brand" placeholder="品牌"></div>
            <div style="flex:7"><label>品項</label><input type="text" id="flavor" placeholder="口味/配方"></div>
        </div>
        <div class="form-row">
            <div style="flex: 1.5;"><label>重量</label>
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="weight" step="0.01" placeholder="數值">
                    <select id="unit" style="width:75px;"><option value="kg">kg</option><option value="lb">lb</option></select>
                </div>
            </div>
            <div style="flex: 1;"><label>價格</label><input type="number" id="price" placeholder="NT$"></div>
        </div>
        <div class="form-group" style="margin-top: 4px;">
            <label>有效期限 (YYYY/MM/DD)</label>
            <input type="text" id="expiry" inputmode="numeric" placeholder="2026/12/31" onkeyup="formatDate(this)">
        </div>
        <button class="btn btn-primary" onclick="addEntry()">加入庫存</button>
    </div>

    <div class="card">
        <h2>開封管理</h2>
        <div class="form-group">
            <label>待開封清單</label>
            <select id="stockSelect"></select>
        </div>
        <div class="form-group">
            <label>開封日期</label>
            <input type="text" id="openDate" inputmode="numeric" onkeyup="formatDate(this)">
        </div>
        <button class="btn btn-secondary" style="margin-top:8px;" onclick="markAsOpen()">確認開封</button>
    </div>

    <div class="card">
        <h2>管理紀錄</h2>
        <div id="recentList"></div>
        <button id="toggleBtn" style="background:none; border:1px solid #eee; color:#999; padding:12px; width:100%; border-radius:12px; font-size:13px; margin-top:15px; display:none;" onclick="toggleArchive()">▼ 查看舊紀錄</button>
        <div id="archiveSection" style="display:none; margin-top:15px; border-top:1px dashed #eee;"></div>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 30px;">
        <button class="btn" style="background:#fff; color:#888; font-size:12px; flex:1; border:1px solid #eee;" onclick="exportData()">💾 導出備份</button>
        <button class="btn" style="background:#fff; color:#888; font-size:12px; flex:1; border:1px solid #eee;" onclick="importData()">🔄 還原數據</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('dogFoodMobileDB') || '[]');
    let currentEditId = null;

    function formatDate(obj) {
        let v = obj.value.replace(/\D/g, '').substring(0, 8);
        if (v.length > 4 && v.length <= 6) { v = v.substring(0, 4) + '/' + v.substring(4); } 
        else if (v.length > 6) { v = v.substring(0, 4) + '/' + v.substring(4, 6) + '/' + v.substring(6); }
        obj.value = v;
    }

    function getTodayStr() {
        const d = new Date();
        return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
    }

    function getDailyUsage() {
        const doneList = db.filter(i => i.status === '已吃完' && i.openDate && i.finishDate);
        if(doneList.length === 0) return 150;
        let total = 0;
        doneList.forEach(i => {
            const diff = (new Date(i.finishDate.replace(/\//g, '-')) - new Date(i.openDate.replace(/\//g, '-'))) / 86400000;
            if(diff > 0) total += (i.weightKg * 1000) / diff;
        });
        return total / doneList.length;
    }

    function saveAndRender() {
        localStorage.setItem('dogFoodMobileDB', JSON.stringify(db));
        const dailyG = getDailyUsage();

        const stocks = db.filter(i => i.status === '庫存').sort((a,b) => new Date(a.expiry.replace(/\//g, '-')) - new Date(b.expiry.replace(/\//g, '-')));
        document.getElementById('stockSelect').innerHTML = stocks.length 
            ? stocks.map(i => `<option value="${i.id}">${i.expiry} | ${i.brand} - ${i.flavor}</option>`).join('')
            : '<option value="">目前無庫存</option>';

        const sortedAll = [...db].sort((a,b) => {
            const s = {'食用中': 3, '庫存': 2, '已吃完': 1};
            return s[b.status] - s[a.status] || b.id - a.id;
        });

        const active = sortedAll.filter(i => i.status !== '已吃完');
        const done = sortedAll.filter(i => i.status === '已吃完');
        const recentDone = done.slice(0, 3);
        const olderDone = done.slice(3);

        const renderItem = (i) => {
            const isAvoid = (i.memo || "").match(/不要買|不回購|雷/);
            const statusClass = i.status === '食用中' ? 'bg-eating' : (i.status === '已吃完' ? 'bg-done' : 'bg-stock');
            const up = (i.price > 0) ? (i.price / (i.weightKg * 1000)).toFixed(2) : '-';
            
            let dateText = '';
            if (i.status === '庫存') {
                const days = Math.round((i.weightKg * 1000) / dailyG);
                const eatingItem = db.find(item => item.status === '食用中');
                let baseDate = new Date();
                if (eatingItem && eatingItem.finishDate) {
                    baseDate = new Date(eatingItem.finishDate.replace(/\//g, '-'));
                }
                const estFinish = new Date(baseDate);
                estFinish.setDate(estFinish.getDate() + days);
                const estStr = `${estFinish.getFullYear()}/${String(estFinish.getMonth()+1).padStart(2,'0')}/${String(estFinish.getDate()).padStart(2,'0')}`;
                const expDate = new Date(i.expiry.replace(/\//g, '-'));
                const isExpiredRisk = estFinish > expDate;
                const alertStyle = isExpiredRisk ? 'color:#ff5252; font-weight:700;' : 'color:#d2691e;';

                dateText = `
                    <div style="font-size:10px; color:#999; margin-top:6px;">📅 有效期限：${i.expiry}</div>
                    <div style="font-size:10px; ${alertStyle} margin-top:2px;">
                        ${isExpiredRisk ? '⚠️ ' : '💡 '}預計吃 ${days} 天 (約 ${estStr} 完食)
                    </div>`;
            } else if (i.status === '食用中') {
                dateText = `
                    <div style="font-size:10px; color:#999; margin-top:6px;">📅 有效期限：${i.expiry}</div>
                    <div style="font-size:10px; color:#2e7d32; font-weight:600; margin-top:2px;">🍴 預計 ${i.finishDate || '...'} 吃完</div>`;
            } else {
                dateText = `<div style="font-size:10px; color:#bbb; margin-top:6px;">🏁 ${i.finishDate} 完食</div>`;
            }

            return `
                <div class="food-item ${isAvoid ? 'avoid-buy' : ''}" onclick="openMemo(${i.id})">
                    <div class="food-info">
                        <div class="food-title-row"><b>${i.brand}</b><span class="status-badge ${statusClass}">${i.status}</span></div>
                        <span class="sub-text">${i.flavor} (${i.weightKg}kg)</span>
                        ${dateText}
                        ${i.memo ? `<div class="memo-text">💬 ${i.memo}</div>` : ''}
                    </div>
                    <div class="food-meta">
                        <div class="price-tag">$${i.price || '-'}</div>
                        <div class="unit-price">$${up}/g</div>
                    </div>
                </div>`;
        };

        document.getElementById('recentList').innerHTML = [...active, ...recentDone].map(renderItem).join('');
        document.getElementById('archiveSection').innerHTML = olderDone.map(renderItem).join('');
        document.getElementById('toggleBtn').style.display = olderDone.length > 0 ? 'block' : 'none';
    }

    function addEntry() {
        const brand = document.getElementById('brand').value.trim();
        const flavor = document.getElementById('flavor').value.trim();
        const weight = parseFloat(document.getElementById('weight').value);
        const unit = document.getElementById('unit').value;
        const price = document.getElementById('price').value;
        const expiry = document.getElementById('expiry').value;
        if(!brand || isNaN(weight) || expiry.length < 10) return alert("請完整填寫品牌、重量與正確日期格式");
        const weightKg = (unit === 'lb') ? (weight * 0.453592).toFixed(2) : weight;
        db.push({ id: Date.now(), brand, flavor, weightKg: parseFloat(weightKg), price: price||0, expiry, status: '庫存', memo: "", openDate: null, finishDate: null });
        saveAndRender();
        ['brand', 'flavor', 'weight', 'price', 'expiry'].forEach(id => document.getElementById(id).value = '');
    }

    function markAsOpen() {
        const id = document.getElementById('stockSelect').value;
        if(!id) return alert("目前沒有庫存項目");
        let openStr = document.getElementById('openDate').value;
        if(!openStr) openStr = getTodayStr();
        const dailyG = getDailyUsage();
        db.forEach(i => { if(i.status === '食用中') { i.status = '已吃完'; i.finishDate = openStr; } });
        const idx = db.findIndex(i => i.id == id);
        db[idx].status = '食用中';
        db[idx].openDate = openStr;
        const days = (db[idx].weightKg * 1000) / dailyG;
        const fDate = new Date(openStr.replace(/\//g, '-'));
        fDate.setDate(fDate.getDate() + Math.round(days));
        db[idx].finishDate = `${fDate.getFullYear()}/${String(fDate.getMonth()+1).padStart(2,'0')}/${String(fDate.getDate()).padStart(2,'0')}`;
        saveAndRender();
    }

    function openMemo(id) {
        currentEditId = id;
        const item = db.find(i => i.id == id);
        document.getElementById('modalTitle').innerText = item.brand;
        document.getElementById('modalSubTitle').innerText = item.flavor + " (" + item.weightKg + "kg)";
        document.getElementById('memoInput').value = item.memo || "";
        document.getElementById('memoModal').style.display = 'flex';
        document.getElementById('deleteBtn').onclick = function() {
            if(confirm('確定要刪除這筆紀錄？')) { db = db.filter(i => i.id != id); closeModal(); saveAndRender(); }
        };
    }

    function saveMemo() {
        const idx = db.findIndex(i => i.id == currentEditId);
        db[idx].memo = document.getElementById('memoInput').value;
        closeModal();
        saveAndRender();
    }

    function closeModal() { document.getElementById('memoModal').style.display = 'none'; }
    function toggleArchive() { 
        const arc = document.getElementById('archiveSection');
        const isHidden = arc.style.display === 'none';
        arc.style.display = isHidden ? 'block' : 'none';
        document.getElementById('toggleBtn').innerText = isHidden ? '▲ 收起' : '▼ 查看舊紀錄';
    }

    function exportData() {
        navigator.clipboard.writeText(JSON.stringify(db)).then(() => alert("數據已複製到剪貼簿"));
    }

    function importData() {
        const input = prompt("請貼上備份數據 (JSON)：");
        if (input) { try { db = JSON.parse(input); saveAndRender(); alert("還原成功！"); } catch (e) { alert("數據格式錯誤"); } }
    }

    document.getElementById('openDate').value = getTodayStr();
    saveAndRender();
</script>
</body>
</html>
