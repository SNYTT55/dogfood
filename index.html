<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samy管家 - 口味回歸修正版</title>
    <style>
        :root { --primary: #d2691e; --secondary: #2e7d32; --accent-blue: #1976d2; --bg: #f8f9fa; --text: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 12px; padding-bottom: 100px;
            overflow-x: hidden;
        }
        
        .container { width: 100%; max-width: 500px; margin: auto; }
        .card { 
            background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee;
        }

        /* 🚀 寬度修正：改用 Grid 佈局強制等分且不撐開 */
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; width: 100%; }
        .grid-row-3 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 8px; margin-bottom: 10px; }
        .full-row { width: 100%; margin-bottom: 10px; }

        label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; color: #888; }
        
        /* 🚀 文字置中與高度一致性 */
        input, select, textarea { 
            width: 100%; height: 46px; padding: 0 12px;
            border: 1.5px solid #eee; border-radius: 10px; 
            font-size: 16px; background: #fafafa; 
            -webkit-appearance: none; appearance: none;
            display: block; line-height: 44px; /* 修正對齊感 */
        }

        input[type="date"] {
            -webkit-appearance: listbox; /* 強制 iOS 使用列表樣式以維持寬度 */
            min-width: 0;
            padding-top: 0; padding-bottom: 0;
        }

        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-stock-blue { background: var(--accent-blue); color: white; }
        .btn-open-green { background: var(--secondary); color: white; }
        
        /* 清單樣式 */
        .food-item { border-bottom: 1px solid #f8f8f8; padding: 12px 6px; display: flex; justify-content: space-between; align-items: center; }
        .food-info { flex: 1; min-width: 0; }
        .status-badge { padding: 2px 8px; border-radius: 12px; font-size: 9px; font-weight: bold; margin-left: 6px; vertical-align: middle; }
        
        .bg-eating { background-color: var(--secondary); color: white; }
        .bg-stock { background-color: #e3f2fd; color: var(--accent-blue); border: 1px solid #bbdefb; }
        .bg-done { background-color: #f5f5f5; color: #999; }
        
        /* 🚀 預計天數藍色文字 */
        .pred-text { font-size: 10px; color: var(--accent-blue) !important; margin-top: 2px; font-weight: bold; }
        .flavor-text { font-size: 0.8rem; color: #666; margin-top: 2px; }
        
        .food-meta { text-align: right; min-width: 95px; }
        .price-tag { font-weight: bold; color: var(--primary); font-size: 1rem; }
        .date-info { font-size: 9px; color: #aaa; margin-top: 2px; }
        
        .backup-area { background: #eee; border: none; padding: 15px; margin-top: 20px; }
        #importArea { height: 40px; font-size: 10px; line-height: 1.2; padding: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--primary); margin: 10px 0;">🐾 Samy管家3.7</h1>

    <div class="card">
        <label style="font-size: 1rem; color: #444; margin-bottom: 12px; font-weight:bold;">📦 新購入庫</label>
        <div class="grid-row">
            <div><label>品牌</label><input type="text" id="brand" placeholder="品牌"></div>
            <div><label>品項 (口味)</label><input type="text" id="flavor" placeholder="口味"></div>
        </div>
        <div class="grid-row-3">
            <div><label>重量</label>
                <div style="display:flex; gap:4px;"><input type="number" id="weight" step="0.01"><select id="unit" style="width:70px;"><option value="kg">kg</option><option value="lb">lb</option></select></div>
            </div>
            <div><label>價格</label><input type="number" id="price" placeholder="$"></div>
        </div>
        <div class="full-row"><label>有效期限</label><input type="date" id="expiry"></div>
        <button class="btn btn-stock-blue" onclick="addEntry()">加入庫存</button>
    </div>

    <div class="card">
        <label style="font-size: 1rem; color: #444; margin-bottom: 12px; font-weight:bold;">🍴 開封管理</label>
        <div class="full-row"><label>選擇庫存包裝</label><select id="stockSelect"></select></div>
        <div class="full-row"><label>開封日期</label><input type="date" id="openDate"></div>
        <button class="btn btn-open-green" onclick="markAsOpen()">確認開封</button>
    </div>

    <div class="card">
        <label style="font-size: 1rem; color: #444; margin-bottom: 12px; font-weight:bold;">📋 紀錄清單</label>
        <div id="recentList"></div>
    </div>

    <div class="card backup-area">
        <label>💾 數據備份與匯入</label>
        <textarea id="importArea" placeholder="貼上備份代碼..."></textarea>
        <div style="display:grid; grid-template-columns: 1fr 1.2fr; gap:8px; margin-top:8px;">
            <button class="btn" style="background:#666; color:#fff; font-size:12px; height:38px;" onclick="importData()">匯入代碼</button>
            <button class="btn" style="background:#888; color:#fff; font-size:12px; height:38px;" onclick="exportCSV()">匯出 CSV 檔</button>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('dogFoodMobileDB') || '[]');

    function saveAndRender() {
        localStorage.setItem('dogFoodMobileDB', JSON.stringify(db));
        
        // 核心：計算平均食量
        const doneList = db.filter(i => i.status === '已吃完' && i.openDate && i.finishDate);
        let dailyG = 150; 
        if(doneList.length > 0) {
            let total = 0;
            doneList.forEach(i => {
                const diff = (new Date(i.finishDate) - new Date(i.openDate)) / 86400000;
                if(diff > 0) total += (i.weightKg * 1000) / diff;
            });
            dailyG = total / doneList.length;
        }

        // 更新下拉選單
        const stocks = db.filter(i => i.status === '庫存').sort((a,b) => new Date(a.expiry) - new Date(b.expiry));
        document.getElementById('stockSelect').innerHTML = stocks.map(i => `<option value="${i.id}">${i.expiry} | ${i.brand}</option>`).join('') || '<option value="">(目前無庫存)</option>';

        // 渲染清單
        const sortedAll = [...db].sort((a,b) => {
            const s = {'食用中': 3, '庫存': 2, '已吃完': 1};
            return s[b.status] - s[a.status] || b.id - a.id;
        });

        const renderItem = (i) => {
            const statusClass = i.status === '食用中' ? 'bg-eating' : (i.status === '已吃完' ? 'bg-done' : 'bg-stock');
            let dateLabel = i.status === '庫存' ? i.expiry + " 到期" : (i.finishDate || "-") + (i.status === '食用中' ? " 預計完食" : " 完食");
            
            // ✨ 預計天數邏輯 (庫存狀態顯現)
            let predText = "";
            if (i.status === '庫存') {
                const days = Math.round((i.weightKg * 1000) / dailyG);
                predText = `<div class="pred-text">📅 預計可吃 ${days} 天</div>`;
            }

            return `
                <div class="food-item">
                    <div class="food-info">
                        <b>${i.brand}</b><span class="status-badge ${statusClass}">${i.status}</span><br>
                        <div class="flavor-text">${i.flavor} (${i.weightKg}kg)</div>
                        ${predText}
                    </div>
                    <div class="food-meta">
                        <div class="price-tag">$${i.price || '-'}</div>
                        <div class="date-info">${dateLabel}</div>
                    </div>
                </div>`;
        };

        document.getElementById('recentList').innerHTML = sortedAll.map(renderItem).join('');
        document.getElementById('importArea').value = JSON.stringify(db);
    }

    function addEntry() {
        const brand = document.getElementById('brand').value.trim();
        const flavor = document.getElementById('flavor').value.trim();
        const weight = parseFloat(document.getElementById('weight').value);
        const unit = document.getElementById('unit').value;
        const price = document.getElementById('price').value;
        const expiry = document.getElementById('expiry').value;
        if(!brand || !flavor || isNaN(weight) || !expiry) return alert("資訊不完整 (請檢查品牌、口味與效期)");
        const weightKg = (unit === 'lb') ? (weight * 0.453592).toFixed(2) : weight;
        db.push({ id: Date.now(), brand, flavor, weightKg: parseFloat(weightKg), price: price||0, expiry, status: '庫存', memo: "" });
        saveAndRender();
        ['brand', 'flavor', 'weight', 'price', 'expiry'].forEach(id => document.getElementById(id).value = '');
    }

    function markAsOpen() {
        const id = document.getElementById('stockSelect').value;
        if(!id) return alert("請先選擇要開封的項目");
        const openStr = document.getElementById('openDate').value;
        
        // 重新計算平均值
        const doneList = db.filter(i => i.status === '已吃完' && i.openDate && i.finishDate);
        let dailyG = 150;
        if(doneList.length > 0) {
            let total = 0;
            doneList.forEach(i => {
                const diff = (new Date(i.finishDate) - new Date(i.openDate)) / 86400000;
                if(diff > 0) total += (i.weightKg * 1000) / diff;
            });
            dailyG = total / doneList.length;
        }

        db.forEach(i => { if(i.status === '食用中') { i.status = '已吃完'; i.finishDate = openStr; } });
        const idx = db.findIndex(i => i.id == id);
        db[idx].status = '食用中';
        db[idx].openDate = openStr;
        const finishDate = new Date(openStr);
        finishDate.setDate(finishDate.getDate() + Math.round((db[idx].weightKg * 1000) / dailyG));
        db[idx].finishDate = finishDate.toISOString().split('T')[0];
        saveAndRender();
    }

    function importData() {
        try {
            const data = JSON.parse(document.getElementById('importArea').value);
            if(Array.isArray(data)) { db = data; saveAndRender(); alert("匯入成功！"); }
        } catch(e) { alert("格式錯誤，無法讀取"); }
    }

    function exportCSV() {
        let csv = "狀態,品牌,品項,kg,價格,到期,完食\n";
        db.forEach(i => csv += `${i.status},${i.brand},${i.flavor},${i.weightKg},${i.price},${i.expiry},${i.finishDate||''}\n`);
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Samy_Stock.csv`;
        link.click();
    }

    document.getElementById('openDate').valueAsDate = new Date();
    saveAndRender();
</script>
</body>
</html>
